services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: docflow-sqlserver
    environment:
      SA_PASSWORD: "Your_password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: docflow-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrator:
    build:
      context: .
      dockerfile: src/DocFlowCloud.Api/Dockerfile.migrator
    container_name: docflow-migrator
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DocFlowCloudDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: src/DocFlowCloud.Api/Dockerfile
    container_name: docflow-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DocFlowCloudDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      Storage__Provider: Local
      Storage__Local__RootPath: /shared-storage
    depends_on:
      migrator:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./logs/api:/app/logs
      - ./shared-storage:/shared-storage

  worker:
    build:
      context: .
      dockerfile: src/DocFlowCloud.Worker/Dockerfile
    container_name: docflow-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DocFlowCloudDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      Storage__Provider: Local
      Storage__Local__RootPath: /shared-storage
    depends_on:
      migrator:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/worker:/app/logs
      - ./shared-storage:/shared-storage

  notification-service:
    build:
      context: .
      dockerfile: src/DocFlowCloud.NotificationService/Dockerfile
    container_name: docflow-notification
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=DocFlowCloudDb;User Id=sa;Password=Your_password123!;TrustServerCertificate=True"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      Storage__Provider: Local
      Storage__Local__RootPath: /shared-storage
    depends_on:
      migrator:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs/notification:/app/logs
      - ./shared-storage:/shared-storage

  web:
    build:
      context: .
      dockerfile: src/DocFlowCloud.Web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: docflow-web
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"
