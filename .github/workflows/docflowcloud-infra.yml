name: DocFlowCloud Infra

on:
  push:
    paths:
      - "infra/**"
      - ".github/workflows/docflowcloud-infra.yml"

  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/docflowcloud-infra.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

  terraform-validate:
    name: Terraform validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: terraform-fmt

    strategy:
      fail-fast: false
      matrix:
        environment:
          - testbed
          - prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infra/environments/${{ matrix.environment }}

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/environments/${{ matrix.environment }}
