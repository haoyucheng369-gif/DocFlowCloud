name: DocFlowCloud CI/CD

on:
  # test 分支承担 testbed 验证职责：
  # 代码推上 test 后，自动执行 CI、构建镜像并进入 testbed 部署阶段。
  #
  # master 分支承担 production promotion 职责：
  # master 仍然跑 CI，但 production 发布通过 workflow_dispatch 手动触发，
  # 并显式传入已经在 testbed 验证过的 image tag。
  push:
    branches:
      - test
      - master

  # PR 只做 CI，不做镜像推送和部署。
  pull_request:

  # production promote 使用手动触发。
  # 这里要求操作者输入一个已经存在于 GHCR 的 image_tag，
  # 从而贯彻 “build once, deploy many” 原则。
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing GHCR image tag to deploy to production"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ------------------------------------------------------------
  # 1. 通用 CI
  # ------------------------------------------------------------
  # 对 PR / test / master 都执行。
  # 这里只做代码层验证，不涉及镜像推送和环境部署。
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/DocFlowCloud.Web/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore DocFlowCloud.sln

      - name: Build .NET solution
        run: dotnet build DocFlowCloud.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/DocFlowCloud.UnitTests/DocFlowCloud.UnitTests.csproj --configuration Release --no-build

      - name: Run integration tests
        run: dotnet test tests/DocFlowCloud.IntegrationTests/DocFlowCloud.IntegrationTests.csproj --configuration Release --no-build

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/DocFlowCloud.Web

      - name: Run frontend tests
        run: npm test
        working-directory: src/DocFlowCloud.Web

      - name: Build frontend
        run: npm run build
        working-directory: src/DocFlowCloud.Web

  # ------------------------------------------------------------
  # 2. 构建并推送镜像
  # ------------------------------------------------------------
  # 只有 test 分支会真正产出 deployable images。
  # 这些镜像随后会先部署到 testbed，
  # 后续 production 再复用同一个 tag，而不是重新构建。
  build-and-push-images:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/test'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: docflowcloud-web
            dockerfile: src/DocFlowCloud.Web/Dockerfile
            context: .
            build_args: |
              VITE_API_BASE_URL=${{ vars.TESTBED_API_BASE_URL != '' && vars.TESTBED_API_BASE_URL || 'https://api-testbed.example.com' }}
              VITE_APP_ENV=testbed
          - image_name: docflowcloud-api
            dockerfile: src/DocFlowCloud.Api/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-worker
            dockerfile: src/DocFlowCloud.Worker/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-notification-service
            dockerfile: src/DocFlowCloud.NotificationService/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-migrator
            dockerfile: src/DocFlowCloud.Api/Dockerfile.migrator
            context: .
            build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=testbed-latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  # ------------------------------------------------------------
  # 3. 自动部署到 testbed
  # ------------------------------------------------------------
  # 这是第一落地环境。
  # 当前仓库阶段，testbed 代表“先验证系统能否部署并运行”。
  #
  # 注意：
  # 现在 Azure 资源和 secrets 还没真正配完，因此这里先做成
  # “有 secrets 就继续部署；没有就明确提示并跳过”，避免整条 CI 因
  # 还没接 Azure 而失败。
  deploy-testbed:
    name: Deploy to testbed
    runs-on: ubuntu-latest
    needs: build-and-push-images
    environment: testbed
    if: >
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Azure testbed deployment readiness
        id: testbed-ready
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] || [ -z "${{ secrets.AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure deployment secrets are missing for the testbed environment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.testbed-ready.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Placeholder testbed deploy step
        if: steps.testbed-ready.outputs.ready == 'true'
        run: |
          echo "Deploy testbed with image tag: ${{ github.sha }}"
          echo "Target recommendation: Azure Container Apps"
          echo "Replace this step with az containerapp update/create commands"

      - name: Testbed deployment skipped
        if: steps.testbed-ready.outputs.ready != 'true'
        run: |
          echo "Testbed deployment was skipped because Azure secrets are not configured yet."
          echo "CI and GHCR image publication still succeeded."

  # ------------------------------------------------------------
  # 4. 手动 promote 到 production
  # ------------------------------------------------------------
  # production 不重新 build，而是复用已经在 testbed 验证过的 image tag。
  # 当前阶段保留为手动触发，后续再补审批和真实 Azure 发布命令。
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/master' &&
      inputs.image_tag != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Azure production deployment readiness
        id: production-ready
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] || [ -z "${{ secrets.AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure deployment secrets are missing for the production environment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.production-ready.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Placeholder production deploy step
        if: steps.production-ready.outputs.ready == 'true'
        run: |
          echo "Deploy production with already-built image tag: ${{ inputs.image_tag }}"
          echo "Production should reuse the image already validated in testbed."
          echo "Replace this step with az containerapp update/create commands"

      - name: Production deployment skipped
        if: steps.production-ready.outputs.ready != 'true'
        run: |
          echo "Production deployment was skipped because Azure secrets are not configured yet."
          echo "When Azure is ready, rerun workflow_dispatch from master with a validated image tag."
