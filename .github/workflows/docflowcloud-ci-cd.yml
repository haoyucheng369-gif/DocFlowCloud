name: DocFlowCloud CI/CD

on:
  # test branch:
  # - run CI
  # - build and push images
  # - deploy to testbed
  #
  # master branch:
  # - run CI
  # - production is promoted manually with an already-validated image tag
  push:
    branches:
      - test
      - master

  # Pull requests only run CI checks.
  pull_request:

  # Production promotion is manual.
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing GHCR image tag to deploy to production"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ------------------------------------------------------------
  # 1. Common CI
  # ------------------------------------------------------------
  # Runs for PRs, test and master.
  # Validates code, tests and frontend build only.
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/DocFlowCloud.Web/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore DocFlowCloud.sln

      - name: Build .NET solution
        run: dotnet build DocFlowCloud.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/DocFlowCloud.UnitTests/DocFlowCloud.UnitTests.csproj --configuration Release --no-build

      - name: Run integration tests
        run: dotnet test tests/DocFlowCloud.IntegrationTests/DocFlowCloud.IntegrationTests.csproj --configuration Release --no-build

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/DocFlowCloud.Web

      - name: Run frontend tests
        run: npm test
        working-directory: src/DocFlowCloud.Web

      - name: Build frontend
        run: npm run build
        working-directory: src/DocFlowCloud.Web

  # ------------------------------------------------------------
  # 2. Build and push images
  # ------------------------------------------------------------
  # Only test branch creates deployable images.
  # These images are first validated in testbed.
  build-and-push-backend-images:
    name: Build and push backend images
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: testbed
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/test'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: docflowcloud-api
            dockerfile: src/DocFlowCloud.Api/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-worker
            dockerfile: src/DocFlowCloud.Worker/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-notification-service
            dockerfile: src/DocFlowCloud.NotificationService/Dockerfile
            context: .
            build_args: ""
          - image_name: docflowcloud-migrator
            dockerfile: src/DocFlowCloud.Api/Dockerfile.migrator
            context: .
            build_args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=testbed-latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}

  build-and-push-web-image:
    name: Build and push web image
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: testbed
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docflowcloud-web
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=testbed-latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/DocFlowCloud.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_ENV=testbed

  # ------------------------------------------------------------
  # 3. Deploy to testbed
  # ------------------------------------------------------------
  # First cloud pass deploys only:
  # - api
  # - web
  #
  # It intentionally does not deploy worker or notification-service yet.
  # The API also disables the realtime RabbitMQ consumer and forces Local storage
  # so the first Azure deployment proves the delivery chain without requiring
  # all backend infrastructure to exist already.
  deploy-testbed:
    name: Deploy to testbed
    runs-on: ubuntu-latest
    needs:
      - build-and-push-backend-images
      - build-and-push-web-image
    environment: testbed
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/test'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Azure testbed deployment readiness
        id: testbed-ready
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] || [ -z "${{ secrets.AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure deployment secrets are missing for the testbed environment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.testbed-ready.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure Container Apps extension is available
        if: steps.testbed-ready.outputs.ready == 'true'
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy API to Azure Container Apps
        if: steps.testbed-ready.outputs.ready == 'true'
        env:
          RESOURCE_GROUP: ${{ vars.TESTBED_RESOURCE_GROUP }}
          CONTAINER_APPS_ENV: ${{ vars.TESTBED_CONTAINERAPPS_ENV }}
          API_APP_NAME: ${{ vars.TESTBED_API_APP_NAME }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docflowcloud-api:${{ github.sha }}
        run: |
          if az containerapp show --name "$API_APP_NAME" --resource-group "$RESOURCE_GROUP" > /dev/null 2>&1; then
            az containerapp update \
              --name "$API_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$API_IMAGE" \
              --set-env-vars \
                ASPNETCORE_ENVIRONMENT=Testbed \
                DOTNET_ENVIRONMENT=Testbed \
                Realtime__EnableJobStatusConsumer=false \
                Storage__Provider=Local
          else
            az containerapp create \
              --name "$API_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APPS_ENV" \
              --image "$API_IMAGE" \
              --ingress external \
              --target-port 8080 \
              --env-vars \
                ASPNETCORE_ENVIRONMENT=Testbed \
                DOTNET_ENVIRONMENT=Testbed \
                Realtime__EnableJobStatusConsumer=false \
                Storage__Provider=Local
          fi

      - name: Capture testbed API URL
        if: steps.testbed-ready.outputs.ready == 'true'
        env:
          RESOURCE_GROUP: ${{ vars.TESTBED_RESOURCE_GROUP }}
          API_APP_NAME: ${{ vars.TESTBED_API_APP_NAME }}
        run: |
          API_FQDN=$(az containerapp show --name "$API_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "Testbed API URL: https://$API_FQDN"
          echo "Update TESTBED_API_BASE_URL in GitHub testbed environment to this value, then push test again so the web image is rebuilt against the real API URL."

      - name: Deploy Web to Azure Container Apps
        if: steps.testbed-ready.outputs.ready == 'true'
        env:
          RESOURCE_GROUP: ${{ vars.TESTBED_RESOURCE_GROUP }}
          CONTAINER_APPS_ENV: ${{ vars.TESTBED_CONTAINERAPPS_ENV }}
          WEB_APP_NAME: ${{ vars.TESTBED_WEB_APP_NAME }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docflowcloud-web:${{ github.sha }}
          API_BASE_URL: ${{ vars.TESTBED_API_BASE_URL }}
        run: |
          if az containerapp show --name "$WEB_APP_NAME" --resource-group "$RESOURCE_GROUP" > /dev/null 2>&1; then
            az containerapp update \
              --name "$WEB_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$WEB_IMAGE" \
              --set-env-vars \
                RUNTIME_API_BASE_URL="$API_BASE_URL" \
                RUNTIME_APP_ENV=testbed
          else
            az containerapp create \
              --name "$WEB_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APPS_ENV" \
              --image "$WEB_IMAGE" \
              --ingress external \
              --target-port 80 \
              --env-vars \
                RUNTIME_API_BASE_URL="$API_BASE_URL" \
                RUNTIME_APP_ENV=testbed
          fi

      - name: Summarize first testbed deployment scope
        if: steps.testbed-ready.outputs.ready == 'true'
        run: |
          echo "Current first-pass cloud deployment scope:"
          echo "- web: deployed"
          echo "- api: deployed"
          echo "- worker: not deployed yet"
          echo "- notification-service: not deployed yet"
          echo "- API realtime consumer disabled in cloud testbed"
          echo "- API storage temporarily forced to Local"

      - name: Testbed deployment skipped
        if: steps.testbed-ready.outputs.ready != 'true'
        run: |
          echo "Testbed deployment was skipped because Azure secrets are not configured yet."
          echo "CI and GHCR image publication still succeeded."

  # ------------------------------------------------------------
  # 4. Promote to production
  # ------------------------------------------------------------
  # Production must reuse an image tag already validated in testbed.
  # It does not rebuild images.
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' && inputs.image_tag != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Azure production deployment readiness
        id: production-ready
        run: |
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ] || [ -z "${{ secrets.AZURE_TENANT_ID }}" ] || [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Azure deployment secrets are missing for the production environment."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        if: steps.production-ready.outputs.ready == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Placeholder production deploy step
        if: steps.production-ready.outputs.ready == 'true'
        run: |
          echo "Deploy production with already-built image tag: ${{ inputs.image_tag }}"
          echo "Production should reuse the image already validated in testbed."
          echo "Replace this step with az containerapp update/create commands"

      - name: Production deployment skipped
        if: steps.production-ready.outputs.ready != 'true'
        run: |
          echo "Production deployment was skipped because Azure secrets are not configured yet."
          echo "When Azure is ready, rerun workflow_dispatch from master with a validated image tag."
